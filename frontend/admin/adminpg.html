<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Scheduled Programs — Bharata Mata College</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Google Fonts for modern typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,800;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="admin-style.css">
    <link rel="icon" type="image/jpeg" href="../assets/logo/logo.jpeg" />
</head>
<body>
    <div class="app-layout">
        <!-- Sticky Navbar matching index.html / venues.html -->
        <header class="navbar">
            <div class="nav-brand">
                <span class="brand-text">BHARATA MATA COLLEGE</span>
            </div>
            
            <nav class="nav-menu">
                <a href="adminpg.html" class="nav-item active">Admin Portal</a>
            </nav>

            <div class="nav-actions">
                <button class="btn-admin logout-btn">Logout</button>
            </div>
        </header>

        <!-- Main Content Area -->
        <main class="venues-main" style="flex: 1;">
            <div class="venues-table-wrap">
                <!-- Search & Filters Toolbar -->
                <div class="table-toolbar admin-toolbar">
                    <h2 class="table-heading">Manage Scheduled Programs</h2>

                    <!-- Search Bar -->
                    <div class="admin-search-wrap">
                        <svg class="admin-search-icon" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35"/></svg>
                        <input
                            type="text"
                            id="admin-search"
                            class="admin-search-input"
                            placeholder="Search by venue, department, contact…"
                            autocomplete="off"
                        >
                        <button class="admin-search-clear" id="admin-search-clear" title="Clear search" style="display:none;">&#x2715;</button>
                    </div>

                    <div style="display: flex; align-items: center; gap: 16px;">
                        <div class="search-group" style="flex-direction: row; align-items: center; gap: 12px; max-width: none;">
                            <label for="venue-filter" class="search-label" style="margin-bottom: 0; white-space: nowrap;">Venue:</label>
                            <select id="venue-filter" class="input-field" style="width: auto; padding: 6px 12px; height: 34px;">
                                <option value="">All</option>
                                <option value="AV Room">AV Room</option>
                                <option value="Stage">Stage</option>
                                <option value="MSW Hall">MSW Hall</option>
                                <option value="MBA Hall">MBA Hall</option>
                                <option value="Seminar Hall">Seminar Hall</option>
                            </select>
                            <label for="date-filter" class="search-label" style="margin-bottom: 0; white-space: nowrap;">Date:</label>
                            <input type="date" id="date-filter" class="input-field" style="width: auto; padding: 6px 12px; height: 34px;">
                            <button class="btn-primary-blue" id="clear-filter" style="padding: 6px 16px; height: 34px; line-height: 1;">Clear Filter</button>
                        </div>
                        <button class="btn-primary-blue" id="newBookingBtn" style="padding: 6px 16px; height: 34px; line-height: 1; border: 1px solid var(--primary-blue);">
                            + New Booking
                        </button>
                    </div>
                </div>

                <!-- Table Content -->
                <div class="table-scroll">
                    <table class="venues-table">
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Name of Function</th>
                                <th>Venue</th>
                                <th>Coordinator</th>
                                <th>Department</th>
                                <th>Time (From)</th>
                                <th>Time (To)</th>
                                <th>Contact No</th>
                                <th style="text-align: center;">Action</th>
                            </tr>
                        </thead>
                        <tbody id="admin-table-body">
                            <!-- Populated dynamically from Supabase -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>

        <!-- System Footer matching index.html / venues.html -->
        <footer class="system-footer">
            <div class="footer-line"></div>
            <p>&copy; 2026 Bharata Mata College Thrikkakara.</p>
        </footer>
    </div>

    <!-- New / Edit Booking Modal -->
    <div id="bookingModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Create New Booking</h2>
                <button class="close-btn" id="closeModalBtn">&times;</button>
            </div>
            <form id="bookingForm" class="booking-form">
                <div class="form-row">
                    <div class="form-group">
                        <label for="booking-date">Date</label>
                        <input type="date" id="booking-date" name="date" required class="input-field">
                    </div>
                    <div class="form-group">
                        <label for="booking-time-from">Time (From)</label>
                        <input type="time" id="booking-time-from" name="timeFrom" required class="input-field">
                    </div>
                    <div class="form-group">
                        <label for="booking-time-to">Time (To)</label>
                        <input type="time" id="booking-time-to" name="timeTo" required class="input-field">
                    </div>
                </div>
                <div class="form-group">
                    <label for="booking-function">Name of Function</label>
                    <input type="text" id="booking-function" name="functionName" placeholder="e.g. Guest Lecture" required class="input-field">
                </div>
                <div class="form-group">
                    <label for="booking-venue">Venue</label>
                    <select id="booking-venue" name="venue" class="input-field" required>
                        <option value="" disabled selected>Select Venue</option>
                        <option value="AV Room">AV Room</option>
                        <option value="Stage">Stage</option>
                        <option value="MSW Hall">MSW Hall</option>
                        <option value="MBA Hall">MBA Hall</option>
                        <option value="Seminar Hall">Seminar Hall</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="booking-coordinator">Coordinator</label>
                    <input type="text" id="booking-coordinator" name="coordinator" placeholder="name " required class="input-field">
                </div>
                <div class="form-group">
                    <label for="booking-department">Department</label>
                    <input type="text" id="booking-department" name="department" placeholder="department name" required class="input-field">
                </div>
                <div class="form-group">
                    <label for="booking-contact">Contact No</label>
                    <input type="tel" id="booking-contact" name="contactNo" placeholder="contact no:" class="input-field">
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" id="cancelModalBtn">Cancel</button>
                    <button type="submit" class="btn btn-primary" id="submitBookingBtn">Save Booking</button>
                </div>
            </form>
        </div>
    </div>

    <div id="toast-container" class="toast-container" aria-live="polite"></div>

    <!-- Supabase and Logic -->
    <script src="../../backend/supabase.js"></script>
    <script src="../login/login.js"></script>
    <script>
        if (typeof isAdminAuthenticated !== 'function' || !isAdminAuthenticated()) {
            window.location.replace('../login/login.html');
        }

        const modal = document.getElementById("bookingModal");
        const modalTitle = document.getElementById("modalTitle");
        const newBookingBtn = document.getElementById("newBookingBtn");
        const closeBtn = document.getElementById("closeModalBtn");
        const cancelBtn = document.getElementById("cancelModalBtn");
        const bookingForm = document.getElementById("bookingForm");
        const submitBookingBtn = document.getElementById("submitBookingBtn");
        const tableBody = document.getElementById("admin-table-body");

        let editingBookingId = null;

        function toTimeInputValue(timeStr) {
            if (!timeStr) return '';
            return String(timeStr).slice(0, 5);
        }

        function getFormData() {
            const contactVal = document.getElementById('booking-contact').value.trim();
            return {
                Date: document.getElementById('booking-date').value,
                'Time(from)': document.getElementById('booking-time-from').value,
                'Time(to)': document.getElementById('booking-time-to').value,
                Function_Name: document.getElementById('booking-function').value.trim(),
                Venue: document.getElementById('booking-venue').value,
                Coordinator: document.getElementById('booking-coordinator').value.trim(),
                Department_Name: document.getElementById('booking-department').value.trim(),
                contact_no: contactVal ? Number(contactVal) : null
            };
        }

        function openCreateModal() {
            editingBookingId = null;
            modalTitle.textContent = 'Create New Booking';
            submitBookingBtn.textContent = 'Save Booking';
            bookingForm.reset();
            modal.classList.add('show');
        }

        function openEditModal(booking) {
            editingBookingId = booking.Booking_ID;
            modalTitle.textContent = 'Edit Booking';
            submitBookingBtn.textContent = 'Update Booking';
            document.getElementById('booking-date').value = booking.Date || '';
            document.getElementById('booking-time-from').value = toTimeInputValue(booking['Time(from)']);
            document.getElementById('booking-time-to').value = toTimeInputValue(booking['Time(to)']);
            document.getElementById('booking-function').value = booking.Function_Name || '';
            document.getElementById('booking-venue').value = booking.Venue || '';
            document.getElementById('booking-coordinator').value = booking.Coordinator || '';
            document.getElementById('booking-department').value = booking.Department_Name || '';
            document.getElementById('booking-contact').value = booking.contact_no ? String(booking.contact_no) : '';
            modal.classList.add('show');
        }

        function closeModal() {
            modal.classList.remove('show');
            bookingForm.reset();
            editingBookingId = null;
            modalTitle.textContent = 'Create New Booking';
            submitBookingBtn.textContent = 'Save Booking';
        }

        newBookingBtn.addEventListener('click', openCreateModal);
        closeBtn.addEventListener('click', closeModal);
        cancelBtn.addEventListener('click', closeModal);

        window.addEventListener('click', (e) => {
            if (e.target === modal) closeModal();
        });
        
        const logoutBtn = document.querySelector(".logout-btn");
        if (logoutBtn) {
            logoutBtn.addEventListener("click", () => {
                if (typeof clearAdminSession === 'function') {
                    clearAdminSession();
                }
                window.location.href = "../index.html";
            });
        }
        
        // Cache all bookings for instant search filtering
        let cachedBookings = [];

        // --- Search logic ---
        const searchInput = document.getElementById('admin-search');
        const searchClear = document.getElementById('admin-search-clear');

        searchInput.addEventListener('input', () => {
            const q = searchInput.value.trim();
            searchClear.style.display = q ? 'flex' : 'none';
            applyFilters();
        });

        searchClear.addEventListener('click', () => {
            searchInput.value = '';
            searchClear.style.display = 'none';
            applyFilters();
        });

        function applyFilters() {
            const filterDate = document.getElementById('date-filter').value;
            const filterVenue = document.getElementById('venue-filter')?.value;
            const q = searchInput.value.trim().toLowerCase();
            const colCount = 9;

            if (cachedBookings.length === 0) return;

            let results = cachedBookings;

            // Date filter
            if (filterDate) {
                results = results.filter(b => b.Date === filterDate);
            }

            // Venue filter
            if (filterVenue) {
                results = results.filter(b => b.Venue === filterVenue);
            }

            // Search filter — venue, department, contact
            if (q) {
                results = results.filter(b =>
                    (b.Venue || '').toLowerCase().includes(q) ||
                    (b.Department_Name || '').toLowerCase().includes(q) ||
                    String(b.contact_no || '').includes(q)
                );
            }

            renderRows(results, colCount);
        }

        async function loadBookings() {
            const colCount = 9;
            tableBody.innerHTML = `<tr><td colspan="${colCount}" style="text-align:center; padding: 20px;">Loading...</td></tr>`;
            const allBookings = await fetchBookings();
            tableBody.innerHTML = '';

            if (allBookings.error || allBookings.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="9" style="text-align:center; padding: 20px;">No bookings found.</td></tr>`;
                return;
            }

            cachedBookings = allBookings;
            applyFilters();
        }

        function renderRows(bookingsToDisplay, colCount = 9) {
            tableBody.innerHTML = '';

            if (bookingsToDisplay.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="${colCount}" style="text-align:center; padding: 20px;">No results found.</td></tr>`;
                return;
            }

            bookingsToDisplay.forEach(b => {
                const tr = document.createElement('tr');
                tr.className = 'row-booked';
                tr.dataset.bookingId = b.Booking_ID;
                const contactNo = b.contact_no ? String(b.contact_no) : '—';
                const timeFrom = toTimeInputValue(b['Time(from)']) || '—';
                const timeTo = toTimeInputValue(b['Time(to)']) || '—';
                tr.innerHTML = `
                    <td style="white-space: nowrap;">${b.Date ? b.Date.split('-').reverse().join('-') : ''}</td>
                    <td class="font-medium">${b.Function_Name || ''}</td>
                    <td>${b.Venue || ''}</td>
                    <td>${b.Coordinator || ''}</td>
                    <td>${b.Department_Name || '—'}</td>
                    <td>${timeFrom}</td>
                    <td>${timeTo}</td>
                    <td>${contactNo}</td>
                    <td>
                        <div class="action-cell">
                            <button type="button" class="btn-action-edit" data-action="edit">Edit</button>
                            <button type="button" class="btn-action-delete" data-action="delete">Delete</button>
                        </div>
                    </td>
                `;
                tableBody.appendChild(tr);
            });
        }

        tableBody.addEventListener('click', async (e) => {
            const btn = e.target.closest('[data-action]');
            if (!btn) return;

            const row = btn.closest('tr');
            const bookingId = Number(row?.dataset.bookingId);
            if (!bookingId) return;

            const booking = cachedBookings.find(b => b.Booking_ID === bookingId);
            if (!booking) return;

            if (btn.dataset.action === 'edit') {
                openEditModal(booking);
                return;
            }

            if (btn.dataset.action === 'delete') {
                const label = booking.Function_Name || 'this booking';
                const displayDate = booking.Date ? booking.Date.split('-').reverse().join('-') : '';
                if (!confirm(`Delete "${label}" on ${displayDate}? This cannot be undone.`)) return;

                btn.disabled = true;
                try {
                    await deleteBooking(bookingId);
                    await loadBookings();
                    showToast('The booking has been removed from the database.', 'success', 'Booking Deleted');
                } catch (err) {
                    showToast(err.message || 'Could not delete booking.', 'error', 'Delete Failed');
                    btn.disabled = false;
                }
            }
        });

        function showToast(message, type = "success", title) {
            const container = document.getElementById("toast-container");
            const toast = document.createElement("div");
            toast.className = `toast toast-${type}`;

            const icon = type === "success"
                ? `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>`
                : `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v4m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/></svg>`;

            const heading = title || (type === "success" ? "Success" : "Something Went Wrong");

            toast.innerHTML = `
                <div class="toast-icon">${icon}</div>
                <div class="toast-content">
                    <strong>${heading}</strong>
                    <p>${message}</p>
                </div>
                <button type="button" class="toast-close" aria-label="Dismiss">&times;</button>
            `;

            container.appendChild(toast);
            requestAnimationFrame(() => toast.classList.add("show"));

            const dismiss = () => {
                toast.classList.remove("show");
                setTimeout(() => toast.remove(), 320);
            };

            toast.querySelector(".toast-close").addEventListener("click", dismiss);
            setTimeout(dismiss, 4500);
        }

        bookingForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const data = getFormData();
            const isEdit = editingBookingId !== null;
            const originalText = submitBookingBtn.textContent;
            submitBookingBtn.textContent = isEdit ? 'Updating...' : 'Saving...';
            submitBookingBtn.disabled = true;

            try {
                if (isEdit) {
                    await updateBooking(editingBookingId, data);
                    showToast('Your changes have been saved to the database.', 'success', 'Booking Updated');
                } else {
                    await insertBooking(data);
                    showToast('Your booking has been saved to the database.', 'success', 'Booking Saved');
                }
                closeModal();
                await loadBookings();
            } catch (err) {
                showToast(err.message || 'Could not save booking. Check your API key in supabase.js.', 'error', isEdit ? 'Update Failed' : 'Save Failed');
            } finally {
                submitBookingBtn.textContent = originalText;
                submitBookingBtn.disabled = false;
            }
        });
        
        const dateFilterInput = document.getElementById("date-filter");
        const venueFilterInput = document.getElementById("venue-filter");
        const clearFilterBtn = document.getElementById("clear-filter");
        
        if (clearFilterBtn) {
            clearFilterBtn.addEventListener('click', () => {
                if (dateFilterInput) dateFilterInput.value = '';
                if (venueFilterInput) venueFilterInput.value = '';
                if (searchInput) {
                    searchInput.value = '';
                    searchClear.style.display = 'none';
                }
                applyFilters();
            });
        }
        if (dateFilterInput) {
            dateFilterInput.addEventListener('change', applyFilters);
        }
        if (venueFilterInput) {
            venueFilterInput.addEventListener('change', applyFilters);
        }
        
        loadBookings();
    </script>
</body>
</html>
